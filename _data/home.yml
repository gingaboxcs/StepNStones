testimonials:
  - コミュニケーションに使える英語を、楽しく、自然に習得してほしくて入園を決めました。
  - 姉がEBSに通っていたので、保育園が出来ると聞き、楽しみながら自然と英語も学んで欲しいと思い入園を決めました。
  - グローバルな子供に育てたかったので、English Schoolを探していたらSSEを見つけました。
  - 英語だけでなく、英語を通していろんなことを学ぶことができると思ったからです。
