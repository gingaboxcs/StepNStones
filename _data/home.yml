feature1: 当校の教育プログラムは、言語・コミュニケーション、遊びを通じた学び、音楽、体育と健康など、様々な方法に焦点を当てています。子供たちは楽しみながら、総合的なスキルや知識を身につけます。
feature2: 登園では、一年を通じて楽しいイベントと年間行事を開催しております。遠足やクリスマスパーティーなど、子供たちが楽しい思い出をつくり、友達と共に当園での特別な瞬間を一緒に楽しみましょう。
introduction_blurb: 当園の制服や、健康的な給食、子供たちを支える情熱的な教師を紹介します。
cambridge_blurb: |-
  英語力を国際レベルではかることのできるテストです。
  イギリスの名門校であるケンブリッジ大学の機関が研究・開発・実施しており、世界で約150ヶ国、年間約400万人が受験しています。
  テストのレベルは段階的に設定されており、自身の英語力に合わせて受けることが可能です。
afterschool_blurb: |-
  子供たちが2歳から5歳までの間、プリスクールに通うことで、
  言語スキルを早期に発展させることができます。
  小学生になったら、彼らは放課後教育プログラムを活用し、
  長期的な英語学習の基盤を築きます。
  2歳から始めるプリスクールと、放課後教育プログラムで
  より実用的な英語スキルを私たちを共に身につけましょう。
subsidy_amount: '3.7'
