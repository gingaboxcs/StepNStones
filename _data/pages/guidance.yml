flow:
- '書類選考により内定者を決定します。

  申し込み人数が定員を上回った場合、厳正な抽選にて内定者を決定します。'
- 面接のお知らせは内定者に郵送されます。お知らせには面接の日時、場所が記載されています。
- '合格者に対して合格通知を郵送します。

  ＊電話での合否連絡は対応しておりません。'
- '合格者は入園金の￥30,000(週5コースの場合)または￥20,000(2歳児週3コースの場合)を納めてください。合格通知と合わせて詳しい内容を送付します。

  ＊一度納められた入園金は返金することができません。ご承知おきください。'
cta: 'Step N’ Stones English Preschoolでは2024年度園児募集しております。

  電話予約にて見学・受付を行っておりますので、

  入園を考えている方は下記電話番号までご連絡ください！'
faq:
- question: Q. 保護者の収入による保育料の増減はありますか？
  answer: ありません。
  color: '#1d2089'
- question: Q. 延長保育の時間と費用はどのようになりますか？
  answer: '8：00～8：30も早朝保育,15：00～18：00が延長保育です。

    費用は入園ガイドをご参照ください。'
  color: '#ffae00'
- question: Q. そのほかの費用負担はありますか？
  answer: 入学金、制服代、給食費、システム料金、保育用品代、行事費、写真代等傷害保険代、遠足代が必要です。
  color: '#84c100'
- question: Q. 保育料の減免制度はありますか？
  answer: 兄弟姉妹が同時在籍する場合、1ヶ月単位で休園する場合、給食の回数が月の半分を下回る場合、それぞれ費用の減免制度があります。
  color: '#ffae00'
- question: Q. 100％英語のインターナショナルスクールではないのですか？
  answer: 日本語も使います。日本語のみのプログラムもありますし、状況により、日本人の保育士が日本語でサポートを行います。
  color: '#ffae00'
- question: Q. これまで英語は全く学習していませんが、大丈夫でしょうか？
  answer: 大丈夫です。ステッピングストーンズのプログラムは単に文法や単語を学習するものではなく、日常の保育や遊びを英語環境で行うものです。最初はとまどいがあるかもしれませんが、日本人保育士が適切にサポートしますので、すぐに慣れ親しみます。
  color: '#ffae00'
- question: Q. 卒園児の英語能力の到達度はどの程度をめざしていますか？
  answer: '本園では、卒園児到達目標として次のような目安を想定しております。

    ・英語を使って意思疎通ができるようになる。

    ・英語でかかれている簡単な絵本を読んで理解できる。

    ・また、具体的な指標として「ケンブリッジ国際児童英語検定（ＹＬＥ）のスターターズ」の受験を予定しています。'
  color: '#ffae00'
- question: Q. 年度の途中でも入園できますか？
  answer: 定員に対して余裕がある場合は可能です。
  color: '#84c100'
- question: Q. 土曜日も開園していますか？
  answer: '土曜日は預かり保育として開園しております。預かり保育となりますので、通常のプロ

    グラムは実施しておりません。(別途料金が必要です) ※2024 年度より'
  color: '#ffae00'
- question: Q. 制服がありますか？また着用は義務ですか？
  answer: 'はい、制服があります。そして着用は義務です。Class.jpのTop からオンラインで注文できます。

    詳しい制服についてはこちらをクリック!'
  color: '#ffae00'
- question: Q. 親が必ず参加しなければならない行事は、どの程度ありますか？
  answer: 運動会、発表会、参観日(年3回)があります。
  color: '#ffae00'
