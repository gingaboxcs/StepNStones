events:
  - heading: テスト
    image: /wp-content/uploads/2023/09/afterschool_11@2x.png
    text: |-
      生徒を適切なクラスに編成するためのテストです。
      リーディング、ライティング、スピーキング、リスニングの4つの要素を全てテストします。

      毎年度末にはYoung Learners English (YLE)を受験します。

      (YLEについては別紙をご覧ください。)
  - heading: サマーイングリッシュ・キャンプ
    image: /wp-content/uploads/2024/02/ASP_6.png
    text: (国内・2021年サンレイク)春と夏のイングリッシュキャンプはそれまでに学んできた英語を試すチャンスです。日本国内で、英語のみを使用する環境で数日間を過ごします。新しいことを学び、新しい友達をつくり、英語だけの環境に身を置くことで、英語の長期記憶の形成をはかります。初めて両親と離れて生活することを含め、大きな経験になります。
