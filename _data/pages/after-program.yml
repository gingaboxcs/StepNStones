intro:
  video: /wp-content/uploads/2023/09/産業未来アフタースクール.mp4
  overview: |-
    子供たちが2歳から5歳までの間はプリスクールに通い、小学生になったら、彼らは放課後教育プログラムを活用し、長期的な英語学習の基盤を築きます。
    2歳から始めるプリスクールと、放課後教育プログラムでより実用的な英語スキルを私たちを共に身につけましょう。

    プログラム期間：1年間 (4月～3月)
    ※継続して6年生まで通って頂けます。
  details: |-
    対象：小学校1年生～6年生
    曜日 :月曜日～金曜日
    時間帯 学校のある日16:00 ~ 19:00
    学校のない日 8:00 ~ 19:00
    休校日 祝祭日・SSEの休日
classes:
  - number: "01"
    title: リーディングクラス（R）
    image: /wp-content/uploads/2023/10/アセット-20@2x-1024x1007.png
    text: |-
      1. リーディングクラス（R）
      まずフォニックスの学習から始めます。アルファベットとその基本的な発音を学び、その後、母音の単音・長音・促音と範囲を広げていきます。
      単音：「A（ア）」「E（エ）」「I（イ）」と発音します
      長音：「A(エー)」「E(イー)」「I(アイ）」などアルファベットの文字で発音します。
      促音：「Call」「Stopped」「Running」のように子音が二つ続いた場合の音です。
      これら（フォニックスクラス1～4）を習得した後、リーディングプログラムへと移行します。実際に文章を声に出して読むことで、単語をつなげて滑らかに読む力、英語で文章を理解する力を養います。
  - number: "02"
    title: ライティング / グラマー クラス（W/G）
    image: /wp-content/uploads/2024/02/ASP_1.png
    text: このクラスでは、文法を正しく理解し、自分で英文を作ることができるように訓練していきます(日本語から英語への翻訳ではなく、初めから英語で文章を作ることができるよう指導していきます)。生徒は自分の考えをまとめる1つの方法として、アウトラインの組み立て方を学び、それを利用して短い文章を作る訓練をします。（例えば、テーマを「学校」とした場合、そこから連想されることがらを書き出し、学校のどの部分に焦点を当てるのか、そのアイディアをどの順序で書くのかアウトラインを作り、1人称・3人称・説明文・物語調など、用途に合わせて書きわける練習をします。）
  - number: "03"
    title: スピーキングクラス
    image: /wp-content/uploads/2024/02/ASP_2.png
    text: まず教室内で使用する単語を教えることから始めます。生徒は母国語を使うことなくコミュニケーションをとることが求められ、“英語だけ”というポリシーにより、積極的に英語をつかう機会が与えられます。このポリシーを徹底していくことで、英語を繰り返し使う事になり、自然に会話ができるようになります。(このポリシーを徹底する為にも、プログラムの時間帯は日本語を使わない、という指導をご家庭でもして頂くようお願い致します。)カンバセーション1 (C1) このクラスでは、生徒は他の生徒と共にコミュニケーションスキルを磨きます。多くの質疑応答の形や単語を学び、彼らの年代にあったトピックでディスカッションを重ねることで、スキルの向上をはかります。（基本的なWhat, Why, Which, When, Who, How, の疑問形を使い、好きな食べ物や本といった親しみやすいトピックについて話し合い、コミュニケーションスキルの向上をはかります）
  - number: "04"
    title: カンバセーション2 (C2)
    image: /wp-content/uploads/2024/02/ASP_3.png
    text: |-
      このクラスでは、基本的には講師と1対1～2で個々にあったペース・内容・方法で学習します。見た物・感情・アイディアなどを言葉を使って“伝える”練習をしていきます。
      例) 複数の絵や写真を見て
      1.それぞれの違いを指摘、説明する
      2.何が表現されているのか等、自分が見た物を伝える
      3.自分の感じたことをまとめ、立ち位置を決めて意見交換する
      “伝える”というスキルの向上で、より円滑なコミュニケーションが可能になります。
  - number: "05"
    title: カルチャークラス(CC)
    image: /wp-content/uploads/2024/02/ASP_4.png
    text: 子どもたちは、数学分野を使った実践的な経験を通じて、数学のスキルと概念の理解を学習します。英語圏の国々への理解を深めるために考案されたクラスです。このクラスでは、英語圏で特に大きな4つの国：アメリカ、イギリス、オーストラリア、カナダの文化の違いを話し合っていきます。学習する国を３ヶ月ごとにかえ、“英語”の歴史、国の成り立ち、人種などの基本的なことから、気候、食べ物、マナーなど生活にそったトピックも学んでいきます。生徒は、様々な違い、または共通点を見つける学習を通して、自分で考え、アイディアの違いを理解し、物事を多角的に見る力を養います。
  - number: "06"
    title: STEMクラス
    image: /wp-content/uploads/2024/02/ASP_5.png
    text: |-
      Science(科学) / Technology(技術) / Engineering(工学) / Math(数学) を英語で学習クラスです。
      科学の実験を行ったり、タブレットを使い動画を作ります。物作りや計算の練習も行うこともあります。
      問題解決に向けて、話し合いをし、試行錯誤を重ね、新たな知識を得ることで、21世紀型スキルを身につけます。
