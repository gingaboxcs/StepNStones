sections:
  - heading: 当スクールへの入園を決めたきっかけや理由を教えて下さい！
    quotes:
      - color: red
        avatar: /wp-content/uploads/2024/03/aedce1716f74d150487c010fffb873c4.png
        text: 他県から出雲に引っ越ししたことをきっかけに出雲市内で通える園を5ヶ所ほど見学して検討しました。少人数の上、カリキュラムがしっかりしていること、Robert先生の園に対する思いや教育方針、一番の決め手は子供達の生き生きと楽しくレッスンに参加する態度でした。
      - color: green
        text: コミュニケーションに使える英語を、楽しく、自然に習得してほしくて入園を決めました。
      - color: blue
        text: 姉がEBSに通っていたので、保育園が出来ると聞き、楽しみながら自然と英語も学んで欲しいと思い入園を決めました。
      - color: gray
        text: グローバルな子供に育てたかったので、English Schoolを探していたらSSEを見つけました。
      - color: yellow
        text: 英語だけでなく、英語を通していろんなことを学ぶことができると思ったからです。
  - heading: 当スクールに通ってみて、お子さんの様子や成長したところはどんなことですか？
    quotes:
      - color: green
        avatar: /wp-content/uploads/2024/03/9c2cdc111cedd466ff82914f2b70aecf.png
        text: 入園前は、早生まれで内向的な性格だったので、園の生活についていけるか心配でしたが、先生方の手厚いサポートや優しいお友達に恵まれて、よく踊りよく歌う、更にレッスン中は積極的に発言する明るい性格に変わりました。(2歳8ヶ月に入園)
      - color: gray
        avatar: /wp-content/uploads/2024/03/9dba943b29f8608109a3af42a80e9896.png
        text: 発音がすごくいいです。いろんなことに興味がもてる。スクールでクッキングをしているので、家でも料理のお手伝いをしたいと言って一緒に作ったりします。オムツがとれた。嫌いな食べ物が減った。畑で野菜のお世話をしたりしているからだと思います。
      - color: red
        text: 英語での短いやりとりが自宅でもみられるようになりました。
      - color: yellow
        text: 英語だけで無く、実際に街を探検し、地図を作ったり、科学を学んだりする中で、色々な事に興味を持つようになりました。
      - color: blue
        text: 泣き虫のおこりん坊で、とても心配でしたが、少人数ならではの、丁寧な関わりをしていただき、お友達にも恵まれ、自信と優しさを身につけ、実験や工作など色々なことに興味の持てる子供になりました。
  - heading: スクールについてこんな魅力がある、英語面でこんなことまでできるようになったこと、などありましたらお願いします！
    quotes:
      - color: yellow
        avatar: /wp-content/uploads/2024/03/42f2f33e6f8e7a81f4df0ee2e9765112.png
        text: STEMレッスンの内容は素晴らしく、好奇心を刺激する内容の上、進学してから学んでいくテーマを幼少期のうち経験することができました。更に、一方的な学びではなく、子供に考えさせたり、グループで協力して解決していくようなアクティブな学びを行なっています。少人数だからこそフットワークも軽く勉強したことを実際に見に行くOutingも充実しています。豊富なコンテンツでICT教育を行っています。日本とアメリカだけでなく、様々な国の先生が在籍しているので、異文化を経験し国際力を身につけることができました。フォニックスの勉強を始め、ReadingとWritingを重ねているうち、英語の本や日常生活で書かれている英語を自分で読めて理解するようになったり、英語で話すようになりました。
      - color: red
        text: 他の保育園などがコロナ禍でイベントを縮小していましたが、元々少人数であるため、遠足やお出かけなどたくさんのイベントがあり、普段できない様々な経験をさせていただけたと思います。
      - color: blue
        text: 家でお絵描きをしていた時に、過去形で短い文を書き、ateは食べましたって事だよ！と教えてくれた事に驚きました。
      - color: green
        text: 覚えた英単語を日常生活で見つけると読んでくれます。スクールで覚えた英語をママやパパに教えてくれます。
      - color: gray
        text: 家でも2人の会話が英語の時がある。ちゃんとした文章が言えるようになってきている。アニメなど英語で見たいと言うようになった。
