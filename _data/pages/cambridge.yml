intro:
  heading: ケンブリッジ児童英検とは？
  photo: /wp-content/uploads/2023/10/cambridge.jpeg
  body: |-
    **英語力を国際レベルではかることのできるテストです**。
    イギリスの名門校であるケンブリッジ大学の機関が研究・開発・実施しており、世界で約150ヶ国、年間約400万人が受験しています。テストのレベルは段階的に設定されており、自身の英語力に合わせて受けることが可能です。

    試験は**リスニング、リーディング・ライティング・スピーキング**の四つの項目があり、自己表現の仕方、語彙力、文法の使用法、そしてコミュニケーション能力の観点から実用的な技能を評価されます。

    内容も日常のことからビジネス、旅行に関する事など多岐にわたり、実際の生活に役立つ英語を身に付けることができ、テストのためだけの英語に終わりません。
    英語を学んできたお子様が、日本国内だけではなく、**世界レベルで英語力を評価されることは絶対的な自信につながります**。
    一生涯の資格にぜひチャレンジしてみてください。
qa:
  - color: blue
    question: Q. YLEはどのようなテストですか？
    answer: |-
      Cambridge Young Learners English Test [YLE]　YLE テストは、**イギリスの名門ケンブリッジ大学の機関が研究、開発、実施するテストです**。
      幼児・小・中学生を対象とするYLEはケンブリッジ児童英検のファーストステップにあたります。

      **スピーキング・リーディング・ライティング・スピーキング**の4つの項目がテストされるので、同じく4項目をはかるYLEは、その練習として最適です。

      1．児童向け英検なので、**問題に使われる題材が易しいです**。（子供の身の回りのトピックが使われます。）
      2．**聴く、読む、書く、話す**の全ての要素がテストされます。（特に話すパートでは、話すことだけではなく、受験者の身振り、手振り、表情などでも評価される場合があります。）
      3．世界中で受けられているテストなので、**自分の英語レベルを世界規模で図ることができます**。それぞれのレベルの合格することで、以下のことが認められます。

      | | Starters | Movers | Flyers |
      |---|---|---|---|
      | L | 身の回りの事がわかる | 人の話している家族の事がわかる | オーディオ、ビデオなどレッスン使用のものがわかる |
      | S | 質問に答えられる | 質問ができる | 問題について話すことができる |
      | R | アルファベッドが認識できる | 絵や写真のある簡単なストーリーや文章を理解することができる | 日常生活に関する長文を理解することができる |
      | W | アルファベットと自分の名前が書ける | 文中の足らない言葉を付け加えることができる | 手紙やe-mailで短いメッセージを書く事ができる |

      Lリスニング／ Rリーディング／ Wライティング／ Sスピーキング
      ※筆記パートでイギリス英語のスペルで書く、スピーキングパートでイギリス英語のイントネーションで話すなどしても、問題はありません。

      **Starters**
      L／ 写真を見て答えたり、指示通り色をぬったりする (20min)
      R/W／ 写真を見て文章があっているか。単語の歯抜け問題。下のBOXから単語を選ぶ。写真をみて、文章問題に一言で答える (20min)
      S／ 一言OR短い単語、文節 以上のことを言う必要はない。EX：どこ？これ何？ここに置いて？自分自身について (3-5min)

      **Movers**
      L／ 写真を見て物と人物を線でつなぐ。会話を聞いて物と物を線でつなぐ。色塗りなど。 (20min)
      R/W／ 言葉の意味のマッチング。写真に対するTorF、大体何を言っていたか(三択)。BOXから単語を選んでいれる。 (30min)
      S／ 何を言っているかわかるか、自分で短い文章を言えるか、発音がきちんとできているか、の三つを評価。二つをみて間違い探して英語で言う。4つのピクチャーでストーリーを作る。4つのなかから一つ選んで訳をはなす。自分自身について (5-7min)

      **Flyers**
      L／ テスト問題形式はSilverとほぼ同じで難易度が少し高い (25min)
      R/W／ テスト問題形式はSilverとほぼ同じ。それに加え、文章中の空白に正しい文章を選んで入れる。日記や手紙の文章空白部分5つを自分で考えて書く (30min)
      S／ 評価方法はSilverと同じ。①試験管と受験者が少し違う部分のある絵を一枚ずつもつ。試験管が三つ木があるといったら、自分の絵の木の本数を答える。②試験管が絵について尋ねてくるので、答えた後、似た質問を試験管にする。③5枚の絵を見せられるので、それで自分でストーリーを作って話す。④自分自身について (7-9min)
  - color: amber
    question: Q. ケンブリッジの提供する児童英検（YLE）と日本の児童英検は何が違うの？
    answer: |-
      日本の児童英検がリスニング問題だけなのに対し、YLEは受験者の年齢に合わせた内容のリスニング・リーディング・ライティング・スピーキングの問題でお子様の英語力をより正確に評価できるとともに、テスト勉強を通して、**英語力を全体的に向上させる**ことができます。
      また国際的に受けられているテストなので、世界レベルでお子様の英語力をはかることができます。
  - color: purple
    question: Q. ケンブリッジ児童英検と日本の英検の違いは何？
    answer: |-
      日本の英検は3級からスピーキングテストがはいりますが、**ケンブリッジ児童英検は最初のレベルからテストされます**。また、日本の英検は、社会人も学生も同じレベルなら同じテストを受けますが、ケンブリッジ児童英検は同じレベルでも学生向けと社会人向けが用意されており、人生経験に関係なく正確に英語力をはかることができます。また、**児童英検と同じで海外の人々と同じ基準で評価されるので、結果がそのまま絶対の自信へとつながります**。
  - color: pink
    question: Q. YLEとケンブリッジ児童英検の良いところは？
    answer: |-
      ①筆記のパートでは、**問題全てが英語で書かれていますので、英訳⇔日本語訳の問題などもありません**。

      ②スピーキングのパートでは、答え方は1つではなく、**口頭以外にボディーランゲージや表情などでも加点されます**。緊張していて多少うまく答えられなくても、カバーできます。**答え方の何が悪いとかはなく、全てが評価対象になるので、お子様のモチベーションを下げません**。また、テストは一人の試験管が質問しながら評価するわけではなく、問題を出す試験管と、評価する専門の試験管二人で行うので、**きちんと正確な会話能力をはかることができます**。
  - color: green
    question: Q. ケンブリッジ児童英検はどう役に立つの？
    answer: |-
      ①　**自分の英語力を世界レベルではかることができるので、結果に信頼性があり、自信につながります**。
      ②　全ての項目を様々な内容でテストされるので、テスト勉強を通して**実用的な英語を身に付けることができます**。
      ③　世界中で多くの企業が評価基準で採用しているので、**外資系企業への就職や昇進・昇給にも有利**です。
      ④　世界の多くの国で英語力を図るためのテストの一つとして正式に採用されているので、**大学留学に必要な英語力の証明として使えます**。
      ⑤　**一度とった資格は一生涯保障されます**。
