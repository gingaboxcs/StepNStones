items:
  - number: "01"
    title: 言語とコミュニケーション
    text: |-
      話すことは読み書きの基礎となります。
      当スクールのプログラムでは言語アクティビティを豊富に取り入れています。
    image: /wp-content/uploads/2024/05/e927959387f07730ba7f66fcee7e7261-1024x1007.png
  - number: "02"
    title: 読み書き
    text: このプログラムでは、まずJolly phonicsを通して読み書きの基礎を身につけます。1つ1つの音を学んだ後、それらの音を使いながら1つの単語を読むブレンド法を学びます。その後、簡単な読み書きへと移行していきます。
    image: /wp-content/uploads/2023/12/d29e7437e943f35904390b3bdf051f19-1024x1007.png
  - number: "03"
    title: 遊びを通して学ぶ
    text: |-
      学習と遊びの共存がとても重要です。
      そのために子どもたちが少人数のグループで一緒に行動する機会を多く設けています。
    image: /wp-content/uploads/2023/09/program_nine_05@2x-1024x1007.png
  - number: "04"
    title: 個人、集団的成長
    text: 当スクールのレッスンは、子どもたちがさまざまな経験・成長ができるようプログラムされています。
    image: /wp-content/uploads/2023/10/アセット-23@2x-1024x1007.png
  - number: "05"
    title: 数学
    text: 子どもたちは、数学分野を使った実践的な経験を通じて、数学のスキルと概念の理解を学習します。
    image: /wp-content/uploads/2023/10/アセット-24@2x-1024x1007.png
  - number: "06"
    title: 科学とテクノロジー
    text: 子どもたちの好奇心、探検や実験したいという意欲を育みます。また、一般的なテクノロジーを認識し、使用することを学びます。
    image: /wp-content/uploads/2023/12/9f4eede8f8076a8499a515a8a91a4865-1024x1007.png
  - number: "07"
    title: 芸術
    text: 子どもたちが芸術形式を学びながら、自分の考えや感情を表現する機会を提供します。音楽や制作活動、ごっこ遊び、ダンス、運動などの芸術的なプロジェクトを友達と協力しながら取り組んでいきます。
    image: /wp-content/uploads/2023/12/5b4d92ef764f0f7fde8a9e696b1be6e9-1024x1007.png
  - number: "08"
    title: 音楽
    text: |-
      このプログラムではProdigiesという幼児音楽プログラムを用いています。
      Prodigiesは、聴覚が最も発達する時期に、音程に焦点を当て作られています。これにより、子どもたちは楽しく簡単に、そして長期的に音程感覚に身につけることができます。
    image: /wp-content/uploads/2023/12/2a02bbaaa166c13a6cdfb66971fa1653-1024x1007.png
  - number: "09"
    title: 体育と健康
    text: 幼児期の発達に適したカリキュラムを用いて、ただ動くのではなく、どうすれば目的の動きができるのかと考えながら行動することで心理運動、情緒、認知の各分野の発達を促しています。子どもたちは、自分の目的に合わせて、教室や自分の持ち物を管理し、健康で安全な生活を送るために必要なスキルを身につけていきます。
    image: /wp-content/uploads/2023/12/178862e465da422b61476d48fbf3af02-1024x1007.png
