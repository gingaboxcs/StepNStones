backend:
  name: github
  repo: gingaboxcs/StepNStones
  branch: main

# Enables `npx decap-server` for editing locally without deploying.
# Has no effect in production (only activates on localhost).
local_backend: true

media_folder: "wp-content/uploads/cms"
public_folder: "/wp-content/uploads/cms"

locale: "ja"

# Logo shown on the CMS login screen (the site's brand logo)
logo_url: "/wp-content/uploads/2023/09/stepnstones-orignal-gradient%E5%85%A8%E4%BD%93-1.png"

collections:
  # ---------------------------------------------------------------------------
  # News posts — rich-text WYSIWYG editor (markdown widget).
  # extension/format match the existing 265 .html posts so they all appear.
  # Hidden fields preserve frontmatter Decap would otherwise strip on save.
  # ---------------------------------------------------------------------------
  - name: "news"
    label: "お知らせ"
    label_singular: "お知らせ"
    folder: "_news"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    sort: "date:desc"
    fields:
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "公開日", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "news_post" }
      - { label: "Post ID", name: "post_id", widget: "hidden", required: false }
      - { label: "本文", name: "body", widget: "markdown" }

  # ---------------------------------------------------------------------------
  # Home page — editable images live in _data/home.yml (no HTML to break)
  # ---------------------------------------------------------------------------
  - name: "home"
    label: "ホーム / Home"
    files:
      - file: "_data/home.yml"
        label: "ホーム / Home"
        name: "home"
        fields:
          - { label: "メイン写真（PC）/ Main photo (desktop)", name: "main_image", widget: "image" }
          - { label: "メイン写真（スマホ）/ Main photo (mobile)", name: "main_image_sp", widget: "image" }
          - { label: "特長1 / Feature 1", name: "feature1", widget: "text" }
          - { label: "特長2 / Feature 2", name: "feature2", widget: "text" }
          - { label: "制服・給食 紹介文 / Uniform & lunch blurb", name: "introduction_blurb", widget: "text" }
          - { label: "ケンブリッジ 紹介文 / Cambridge blurb", name: "cambridge_blurb", widget: "text" }
          - { label: "放課後 紹介文 / After-school blurb", name: "afterschool_blurb", widget: "text" }
          - { label: "補助金額（数字）/ Subsidy amount", name: "subsidy_amount", widget: "string" }
          - { label: "お問い合わせ 案内文 / Contact CTA", name: "contact_cta", widget: "text" }
          - { label: "保護者の声 / Testimonials", name: "testimonials", widget: "list" }

  # ---------------------------------------------------------------------------
  # Page content — per-page text & images live in _data/pages/*.yml. Layout is
  # fixed in the templates; editors only change words and pictures.
  # ---------------------------------------------------------------------------
  - name: "page_content"
    label: "ページ内容 / Page content"
    files:
      - file: "_data/pages/contact.yml"
        label: "お問い合わせ / Contact"
        name: "contact"
        fields:
          - { label: "案内文 / Intro text", name: "intro", widget: "text" }
      - file: "_data/pages/program.yml"
        label: "プログラム / Program"
        name: "program"
        fields:
          - label: "項目 / Items"
            name: "items"
            widget: "list"
            label_singular: "項目 / Item"
            summary: "{{fields.number}}. {{fields.title}}"
            fields:
              - { label: "番号 / Number", name: "number", widget: "string" }
              - { label: "タイトル / Title", name: "title", widget: "string" }
              - { label: "説明 / Description", name: "text", widget: "text" }
              - { label: "イラスト / Image", name: "image", widget: "image" }
      - file: "_data/pages/about.yml"
        label: "当園について / About"
        name: "about"
        fields:
          - label: "ごあいさつ / Greeting"
            name: "greeting"
            widget: "object"
            fields:
              - { label: "写真 / Photo", name: "image", widget: "image" }
              - { label: "本文1 / Text 1", name: "text1", widget: "text" }
              - { label: "本文2 / Text 2", name: "text2", widget: "text" }
              - { label: "署名 / Signature", name: "signature", widget: "string" }
          - label: "教育理念 / Philosophy"
            name: "philosophy"
            widget: "object"
            fields:
              - { label: "写真1 / Image 1", name: "image1", widget: "image" }
              - { label: "写真2 / Image 2", name: "image2", widget: "image" }
              - { label: "本文 / Intro", name: "intro", widget: "text" }
              - { label: "ポイント1 写真 / Point 1 image", name: "point1_image", widget: "image" }
              - { label: "ポイント1 本文 / Point 1 text", name: "point1_text", widget: "text" }
              - { label: "ポイント2 写真 / Point 2 image", name: "point2_image", widget: "image" }
              - { label: "ポイント2 本文 / Point 2 text", name: "point2_text", widget: "text" }
          - label: "施設紹介 / Facility"
            name: "facility"
            widget: "object"
            fields:
              - label: "園舎 / Building"
                name: "building"
                widget: "object"
                fields:
                  - { label: "見出し / Heading", name: "heading", widget: "string" }
                  - { label: "本文 / Text", name: "text", widget: "text" }
                  - { label: "写真 / Image", name: "image", widget: "image" }
              - label: "ホール / Hall"
                name: "hall"
                widget: "object"
                fields:
                  - { label: "見出し / Heading", name: "heading", widget: "string" }
                  - { label: "本文 / Text", name: "text", widget: "text" }
                  - { label: "写真 / Image", name: "image", widget: "image" }
              - label: "教室 / Classroom"
                name: "classroom"
                widget: "object"
                fields:
                  - { label: "見出し / Heading", name: "heading", widget: "string" }
                  - { label: "本文 / Text", name: "text", widget: "text" }
                  - { label: "写真 / Image", name: "image", widget: "image" }
              - label: "園庭 / Playground"
                name: "playground"
                widget: "object"
                fields:
                  - { label: "見出し / Heading", name: "heading", widget: "string" }
                  - { label: "本文 / Text", name: "text", widget: "text" }
                  - { label: "写真 / Image", name: "image", widget: "image" }
          - label: "アクセス / Access"
            name: "access"
            widget: "object"
            fields:
              - { label: "ロゴ / Logo", name: "logo", widget: "image" }
              - { label: "アクセス補足 / Access note", name: "note", widget: "string" }
          - label: "資料 / Documents"
            name: "documents"
            widget: "list"
            label_singular: "資料 / Document"
            summary: "{{fields.label}}"
            fields:
              - { label: "ラベル / Label", name: "label", widget: "string" }
              - { label: "PDF", name: "file", widget: "file" }
      - file: "_data/pages/schedule.yml"
        label: "スケジュール / Schedule"
        name: "schedule"
        fields:
          - label: "月 / Months"
            name: "months"
            widget: "list"
            label_singular: "月 / Month"
            summary: "{{fields.month}}月"
            fields:
              - { label: "月 / Month number", name: "month", widget: "string" }
              - { label: "イラスト / Image", name: "image", widget: "image" }
              - { label: "イベント / Events", name: "events", widget: "list" }
          - { label: "注記 / Footnote", name: "footnote", widget: "string" }
      - file: "_data/pages/daily-schedule.yml"
        label: "1日のスケジュール / Daily schedule"
        name: "daily_schedule"
        fields:
          - label: "スケジュール / Timeline"
            name: "items"
            widget: "list"
            label_singular: "項目 / Item"
            summary: "{{fields.time}} {{fields.title}}"
            fields:
              - { label: "時間 / Time", name: "time", widget: "string" }
              - { label: "タイトル / Title", name: "title", widget: "string" }
              - { label: "写真 / Photo", name: "photo", widget: "image" }
              - { label: "アイコン / Icon", name: "icon", widget: "image" }
      - file: "_data/pages/users-voice.yml"
        label: "保護者の声 / Parents' voices"
        name: "users_voice"
        fields:
          - label: "セクション / Sections"
            name: "sections"
            widget: "list"
            label_singular: "セクション / Section"
            summary: "{{fields.heading}}"
            fields:
              - { label: "質問 / Question heading", name: "heading", widget: "text" }
              - label: "コメント / Quotes"
                name: "quotes"
                widget: "list"
                label_singular: "コメント / Quote"
                summary: "{{fields.text}}"
                fields:
                  - { label: "本文 / Text", name: "text", widget: "text" }
                  - label: "色 / Color"
                    name: "color"
                    widget: "select"
                    default: "red"
                    options:
                      - { label: "赤 / Red", value: "red" }
                      - { label: "緑 / Green", value: "green" }
                      - { label: "青 / Blue", value: "blue" }
                      - { label: "グレー / Gray", value: "gray" }
                      - { label: "黄 / Yellow", value: "yellow" }
                  - { label: "アバター / Avatar (任意)", name: "avatar", widget: "image", required: false }
      - file: "_data/pages/after-program.yml"
        label: "放課後教育プログラム / After-school"
        name: "after_program"
        fields:
          - label: "イントロ / Intro"
            name: "intro"
            widget: "object"
            fields:
              - { label: "動画 / Video", name: "video", widget: "file" }
              - { label: "概要 / Overview", name: "overview", widget: "text" }
              - { label: "詳細 / Details", name: "details", widget: "text" }
          - label: "クラス / Classes"
            name: "classes"
            widget: "list"
            label_singular: "クラス / Class"
            summary: "{{fields.number}}. {{fields.title}}"
            fields:
              - { label: "番号 / Number", name: "number", widget: "string" }
              - { label: "タイトル / Title", name: "title", widget: "string" }
              - { label: "説明 / Description", name: "text", widget: "text" }
              - { label: "イラスト / Image", name: "image", widget: "image" }
          - label: "時間割 / Timetable"
            name: "timetable"
            widget: "object"
            fields:
              - { label: "曜日 / Days", name: "days", widget: "list" }
              - label: "行 / Rows"
                name: "rows"
                widget: "list"
                label_singular: "行 / Row"
                summary: "{{fields.time}}"
                fields:
                  - { label: "時間 / Time", name: "time", widget: "string" }
                  - label: "コマ / Cells"
                    name: "cells"
                    widget: "list"
                    fields:
                      - { label: "英 / EN", name: "en", widget: "string" }
                      - { label: "和 / JP", name: "jp", widget: "string" }
              - { label: "注記 / Caption", name: "caption", widget: "text" }
          - label: "イベント / Events"
            name: "events"
            widget: "list"
            label_singular: "イベント / Event"
            summary: "{{fields.heading}}"
            fields:
              - { label: "見出し / Heading", name: "heading", widget: "string" }
              - { label: "写真 / Image", name: "image", widget: "image" }
              - { label: "本文 / Text", name: "text", widget: "text" }
      - file: "_data/pages/introduction.yml"
        label: "制服・給食 / Uniform & Lunch"
        name: "introduction_extras"
        fields:
          - label: "制服 / Uniform"
            name: "uniform"
            widget: "object"
            fields:
              - { label: "見出し / Heading", name: "heading", widget: "string" }
              - { label: "案内文 / Intro", name: "intro", widget: "markdown" }
              - { label: "補足 / Note", name: "note", widget: "text" }
              - { label: "写真1 / Image 1", name: "image1", widget: "image" }
              - { label: "写真2 / Image 2", name: "image2", widget: "image" }
          - label: "給食 / Lunch"
            name: "lunch"
            widget: "object"
            fields:
              - { label: "見出し / Heading", name: "heading", widget: "string" }
              - { label: "本文 / Text", name: "text", widget: "text" }
              - { label: "写真 / Image", name: "image", widget: "image" }

      - file: "_data/pages/cambridge.yml"
        label: "ケンブリッジ児童英検 / Cambridge"
        name: "cambridge"
        fields:
          - label: "イントロ / Intro"
            name: "intro"
            widget: "object"
            fields:
              - { label: "見出し / Heading", name: "heading", widget: "string" }
              - { label: "写真 / Photo", name: "photo", widget: "image" }
              - { label: "本文 / Body", name: "body", widget: "markdown" }
          - label: "Q&A"
            name: "qa"
            widget: "list"
            label_singular: "Q&A"
            summary: "{{fields.question}}"
            fields:
              - { label: "質問 / Question", name: "question", widget: "string" }
              - { label: "回答 / Answer", name: "answer", widget: "markdown" }
              - label: "色 / Color"
                name: "color"
                widget: "select"
                default: "blue"
                options:
                  - { label: "青 / Blue", value: "blue" }
                  - { label: "黄 / Amber", value: "amber" }
                  - { label: "紫 / Purple", value: "purple" }
                  - { label: "桃 / Pink", value: "pink" }
                  - { label: "緑 / Green", value: "green" }
      - file: "_data/pages/guidance.yml"
        label: "入園案内 / Guidance"
        name: "guidance"
        fields:
          - { label: "募集定員 見出し / Capacity heading", name: "capacity_heading", widget: "string" }
          - label: "募集定員 / Capacity"
            name: "capacity"
            widget: "list"
            label_singular: "クラス / Class"
            summary: "{{fields.label}}"
            fields:
              - { label: "クラス / Label", name: "label", widget: "text" }
              - { label: "定員 / Count", name: "count", widget: "string" }
          - { label: "入園の流れ / Admission flow (steps)", name: "flow", widget: "list" }
          - { label: "ご案内文 / Call-to-action", name: "cta", widget: "text" }
          - label: "よくある質問 / FAQ"
            name: "faq"
            widget: "list"
            label_singular: "Q&A"
            summary: "{{fields.question}}"
            fields:
              - { label: "質問 / Question", name: "question", widget: "string" }
              - { label: "回答 / Answer", name: "answer", widget: "markdown" }
              - { label: "色 / Color (hex)", name: "color", widget: "string", default: "#ffae00" }
          - label: "資料 / Documents"
            name: "documents"
            widget: "list"
            label_singular: "資料 / Document"
            summary: "{{fields.label}}"
            fields:
              - { label: "ラベル / Label", name: "label", widget: "string" }
              - label: "リンク / Links"
                name: "links"
                widget: "list"
                summary: "{{fields.text}}"
                fields:
                  - { label: "表示名 / Text", name: "text", widget: "string" }
                  - { label: "PDF", name: "file", widget: "file" }

  # ---------------------------------------------------------------------------
  # Teachers (先生紹介) — edits _data/teachers.yml. Layout is fixed in the
  # template; editors only change name/photo/text and can drag to reorder.
  # ---------------------------------------------------------------------------
  - name: "teachers"
    label: "先生紹介 / Teachers"
    files:
      - file: "_data/teachers.yml"
        label: "先生紹介 / Teachers"
        name: "teachers"
        fields:
          - label: "先生 / Teachers"
            name: "teachers"
            widget: "list"
            label_singular: "先生 / Teacher"
            summary: "{{fields.name}}"
            fields:
              - { label: "名前 / Name", name: "name", widget: "string" }
              - { label: "写真 / Photo", name: "photo", widget: "image" }
              - label: "セクション / Section"
                name: "group"
                widget: "select"
                options:
                  - { label: "プリスクール担当 / Preschool", value: "preschool" }
                  - { label: "小学生放課後プログラム担当 / After-school", value: "afterschool" }
                default: "preschool"
              - { label: "大きく上に表示 / Featured (centered at top)", name: "featured", widget: "boolean", default: false }
              - label: "内容 / Content"
                name: "sections"
                widget: "list"
                label_singular: "項目 / Item"
                summary: "{{fields.label}}"
                fields:
                  - { label: "見出し / Label（例: 経歴, 趣味, ひとこと）", name: "label", widget: "string", required: false }
                  - { label: "本文 / Text", name: "body", widget: "text" }

  # ---------------------------------------------------------------------------
  # Site-wide settings (_data/site.yml)
  # ---------------------------------------------------------------------------
  - name: "settings"
    label: "サイト設定"
    files:
      - file: "_data/site.yml"
        label: "サイト全体"
        name: "site"
        fields:
          - { label: "サイト名", name: "title", widget: "string" }
          - { label: "キャッチコピー", name: "tagline", widget: "string" }
          - { label: "電話番号", name: "phone", widget: "string", required: false }
          - { label: "住所", name: "address", widget: "text", required: false }
          - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
          - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
